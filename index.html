<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coin Clicker</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div id="page">

    <!-- LEFT SIDE -->

    <div id="game">

        <header id="topBar">

            <h1>🪙 Coin Clicker</h1>

            <div id="stats">

                <div class="stat">

                    💰

                    <span id="coins">

                        0 Coins

                    </span>

                </div>

                <div class="stat">

                    ⚡

                    Power

                    <span id="power">

                        1

                    </span>

                </div>

            </div>

        </header>

        <div id="coinArea">

            <button id="coinButton">

                🪙

            </button>

            <div id="floating"></div>

        </div>

        <div id="bottomPanels">

            <!-- Upgrade -->

            <div class="panel">

                <h2>

                    ⬆ Upgrade

                </h2>

                <p>

                    Cost

                    <span id="cost">

                        50

                    </span>

                </p>

                <button id="upgrade">

                    Upgrade

                </button>

                <button id="reset">

                    Reset Progress

                </button>

            </div>

            <!-- Egg -->

            <div class="panel">

                <h2>

                    🥚 Egg

                </h2>

                <p>

                    Cost

                    <span id="eggCost">

                        100

                    </span>

                </p>

                <button id="eggButton">

                    Buy Egg

                </button>

            </div>

            <!-- Pets -->

            <div class="panel" id="petsPanel">

                <h2>

                    🐾 Pets

                </h2>

                <div id="petList">

                    No Pets

                </div>

            </div>

        </div>

    </div>

    <!-- RIGHT SIDE -->

    <aside id="rebirthPanel">

        <h2>

            ♻️ Rebirth

        </h2>

        <p>

            Rebirths

            <br>

            <span id="rebirths">

                0

            </span>

        </p>

        <p>

            Coin Boost

            <br>

            <span id="boost">

                1.0x

            </span>

        </p>

        <p>

            Cost

            <br>

            <span id="rebirthCost">

                1000

            </span>

        </p>

        <button id="rebirthButton">

            REBIRTH

        </button>

    </aside>

</div>

<script src="js/game.js"></script>
<script src="js/pets.js"></script>
<script src="js/eggs.js"></script>

</body>

</html>
