<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Clicker</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div id="page">

    <div id="game">

        <header id="topBar">

            <div id="logo">

                <h1>🥚 Coin Clicker</h1>

            </div>

            <div id="stats">

                <div class="stat">

                    <small>COINS</small>

                    <span id="coins">0 Coins</span>

                </div>

                <div class="stat">

                    <small>POWER</small>

                    <span id="power">1</span>

                </div>

                <div class="stat">

                    <small>BOOST</small>

                    <span id="boost">1.0x</span>

                </div>

            </div>

        </header>

        <main id="center">

            <div id="coinArea">

                <button id="coinButton">🪙</button>

                <div id="floating"></div>

            </div>

        </main>

        <section id="bottomPanels">

            <div class="panel">

                <h2>⬆ Upgrade</h2>

                <p>

                    Upgrade Cost

                    <span id="cost">50</span>

                </p>

                <button id="upgrade">Upgrade</button>

            </div>

            <div class="panel">

                <h2>🥚 Egg</h2>

                <p>

                    Egg Cost

                    <span id="eggCost">100</span>

                </p>

                <button id="eggButton">Buy Egg</button>

            </div>

            <div class="panel" id="petsPanel">

                <h2>🐾 Pets</h2>

                <div id="petList">

                    No Pets

                </div>

            </div>

        </section>

    </div>

    <aside id="sideBar">

        <div id="rebirthPanel">

            <h2>♻️ Rebirth</h2>

            <p>

                Rebirths

                <span id="rebirths">0</span>

            </p>

            <p>

                Next Rebirth

                <span id="rebirthCost">1000</span>

            </p>

            <button id="rebirthButton">

                REBIRTH

            </button>

        </div>

        <button id="reset">

            Reset Progress

        </button>

    </aside>

</div>

<script src="js/game.js"></script>
<script src="js/pets.js"></script>
<script src="js/eggs.js"></script>

</body>
</html>
