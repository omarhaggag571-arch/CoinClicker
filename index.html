<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Coin Clicker</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- Rebirth Panel -->

<div id="rebirthPanel">

<h2>♻️ Rebirth</h2>

<p>

Rebirths

<br>

<span id="rebirths">

0

</span>

</p>

<p>

Coin Boost

<br>

<span id="boost">

1.0x

</span>

</p>

<p>

Cost

<br>

<span id="rebirthCost">

1000

</span>

</p>

<button id="rebirthButton">

REBIRTH

</button>

</div>

<!-- Main Game -->

<div id="game">

<h1>🪙 Coin Clicker</h1>

<h2 id="coins">

0 Coins

</h2>

<button id="coinButton">

🪙

</button>

<div id="floating"></div>

<!-- Upgrade -->

<div class="panel">

<h2>

⬆ Upgrade

</h2>

<p>

Click Power

<span id="power">

1

</span>

</p>

<p>

Upgrade Cost

<span id="cost">

50

</span>

</p>

<button id="upgrade">

Upgrade

</button>

<button id="reset">

🔴 Reset Progress

</button>

</div>

<!-- Egg -->

<div class="panel">

<h2>

🥚 Egg

</h2>

<p>

Egg Cost

<span id="eggCost">

100

</span>

</p>

<button id="eggButton">

Buy Egg

</button>

</div>

<!-- Pets -->

<div class="panel">

<h2>

🐾 Pets

</h2>

<div id="petList">

No Pets

</div>

</div>

</div>

<script src="js/game.js"></script>
<script src="js/pets.js"></script>
<script src="js/eggs.js"></script>

</body>

</html>
